<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0d0d0d">
  <title>Training Log</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f; --border: #2a2a2a;
      --accent: #e8621a; --text: #f0ece4; --text-muted: #7a7570; --text-dim: #4a4540;
      --green: #4caf74; --green-dim: rgba(76,175,116,0.15);
      --blue: #4a9eff; --yellow: #f0b429; --purple: #a78bfa;
      --font-head: 'Barlow Condensed', sans-serif; --font-mono: 'DM Mono', monospace;
      --radius: 6px; --safe-bottom: env(safe-area-inset-bottom, 0px); --nav-h: 60px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-head); -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: calc(var(--nav-h) + var(--safe-bottom)); }

    /* NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: calc(var(--nav-h) + var(--safe-bottom)); background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 50; padding-bottom: var(--safe-bottom); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: none; border: none; color: var(--text-dim); font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
    .nav-btn.active { color: var(--accent); }

    /* HEADER */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .header-title { font-size: 22px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
    .header-title span { color: var(--accent); }
    .back-btn { background: none; border: none; color: var(--accent); font-family: var(--font-head); font-size: 15px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; padding: 6px 0; display: flex; align-items: center; gap: 6px; }
    .header-action { background: none; border: none; color: var(--text-muted); font-family: var(--font-head); font-size: 14px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; }
    .header-action.accent { color: var(--accent); }

    /* TABS */
    .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; }
    .tab { flex: 1; padding: 12px 0; background: none; border: none; color: var(--text-muted); font-family: var(--font-head); font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .scroll-body { flex: 1; overflow-y: auto; padding-bottom: 24px; -webkit-overflow-scrolling: touch; }

    /* WORKOUT CARDS */
    .day-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: border-color 0.15s, background 0.15s; -webkit-tap-highlight-color: transparent; }
    .day-card:active { background: var(--surface2); border-color: var(--accent); }
    .day-badge { font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); background: var(--surface2); border-radius: 4px; padding: 4px 8px; white-space: nowrap; flex-shrink: 0; }
    .day-card-info { flex: 1; }
    .day-card-name { font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1; }
    .day-card-sub { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; }
    .day-card-last { font-size: 11px; font-weight: 500; color: var(--text-dim); margin-top: 5px; font-family: var(--font-mono); }
    .day-card-last.recent { color: var(--green); }
    .day-arrow { color: var(--text-dim); flex-shrink: 0; }

    /* WORKOUT SESSION */
    .workout-header { padding: 20px 20px 0; }
    .workout-day-label { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; }
    .workout-name { font-size: 40px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.03em; line-height: 1; margin-top: 2px; }
    .workout-date { font-size: 12px; font-family: var(--font-mono); color: var(--text-muted); margin-top: 6px; }
    .exercise-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .exercise-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .exercise-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
    .exercise-name { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.1; }
    .exercise-meta { display: flex; gap: 10px; margin-top: 4px; align-items: center; }
    .exercise-target { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
    .exercise-note { font-size: 11px; font-weight: 500; color: var(--accent); font-family: var(--font-mono); }
    .sets-container { padding: 8px 0; }
    .set-row { display: grid; grid-template-columns: 36px 1fr 1fr 44px; align-items: center; gap: 6px; padding: 5px 12px; transition: background 0.1s; }
    .set-row.completed { background: var(--green-dim); }
    .set-num { font-size: 12px; font-weight: 700; color: var(--text-dim); font-family: var(--font-mono); text-align: center; }
    .set-row.completed .set-num { color: var(--green); }
    .set-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font-mono); font-size: 16px; font-weight: 500; width: 100%; padding: 6px 8px; text-align: center; outline: none; -webkit-appearance: none; transition: border-color 0.15s; }
    .set-input:focus { border-color: var(--accent); }
    .set-input::placeholder { color: var(--text-dim); font-size: 12px; }
    .set-row.completed .set-input { border-color: rgba(76,175,116,0.3); background: rgba(76,175,116,0.05); }
    .set-complete-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); background: none; color: var(--text-dim); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .set-complete-btn:active { transform: scale(0.9); }
    .set-row.completed .set-complete-btn { background: var(--green); border-color: var(--green); color: #fff; }
    .sets-header-row { display: grid; grid-template-columns: 36px 1fr 1fr 44px; gap: 6px; padding: 2px 12px 4px; }
    .sets-header-cell { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); font-family: var(--font-mono); text-align: center; }
    .finish-btn { margin: 4px 20px 0; width: calc(100% - 40px); padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font-head); font-size: 18px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
    .finish-btn:active { opacity: 0.85; transform: scale(0.98); }



    /* WORKOUT HISTORY */
    .history-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .history-empty { padding: 60px 20px; text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; cursor: pointer; transition: border-color 0.15s; -webkit-tap-highlight-color: transparent; }
    .history-card:active { border-color: var(--accent); }
    .history-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .history-card-name { font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
    .history-card-date { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); text-align: right; flex-shrink: 0; margin-top: 3px; }
    .history-card-stats { display: flex; gap: 16px; margin-top: 8px; }
    .history-stat { display: flex; flex-direction: column; gap: 1px; }
    .history-stat-val { font-size: 16px; font-weight: 700; font-family: var(--font-mono); }
    .history-stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }
    .history-ex-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
    .history-ex-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .history-ex-name { font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
    .history-set-row { display: flex; gap: 12px; padding: 3px 0; border-bottom: 1px solid var(--border); }
    .history-set-row:last-child { border-bottom: none; }
    .history-set-num { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); min-width: 28px; }
    .history-set-data { font-size: 13px; font-family: var(--font-mono); }
    .history-set-data span { color: var(--text-muted); }

    /* SUMMARY MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: flex-end; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal { width: 100%; max-width: 480px; margin: 0 auto; background: var(--surface); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 28px 24px calc(32px + var(--safe-bottom) + var(--nav-h)); transform: translateY(60px); transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1); }
    .modal-overlay.visible .modal { transform: translateY(0); }
    .modal-title { font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
    .modal-title span { color: var(--accent); }
    .modal-stats { display: flex; gap: 12px; margin: 20px 0 24px; }
    .modal-stat { flex: 1; background: var(--surface2); border-radius: var(--radius); padding: 12px 8px; text-align: center; }
    .modal-stat-val { font-size: 24px; font-weight: 800; font-family: var(--font-mono); color: var(--accent); line-height: 1; }
    .modal-stat-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }
    .modal-close-btn { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font-head); font-size: 17px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; }

    /* ══ MACROS ════════════════════════════════════════ */
    .macro-page { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

    /* date bar */
    .macro-date-bar { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; }
    .macro-date-nav { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px 10px; font-size: 22px; line-height: 1; -webkit-tap-highlight-color: transparent; }
    .macro-date-nav:active { color: var(--accent); }
    .macro-date-nav:disabled { opacity: 0.2; pointer-events: none; }
    .macro-date-display { font-size: 17px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; text-align: center; flex: 1; cursor: pointer; }

    /* totals bar */
    .macro-totals { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .macro-totals-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .macro-totals-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
    .macro-total-item { text-align: center; }
    .macro-total-val { font-size: 20px; font-weight: 800; font-family: var(--font-mono); line-height: 1; }
    .macro-total-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
    .macro-total-goal { font-size: 9px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 1px; }

    /* progress bars */
    .macro-bars { display: flex; flex-direction: column; gap: 7px; }
    .macro-bar-row { display: flex; align-items: center; gap: 8px; }
    .macro-bar-name { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; min-width: 56px; color: var(--text-muted); }
    .macro-bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .macro-bar-fill { height: 100%; border-radius: 3px; transition: width 0.35s ease; }
    .macro-bar-nums { font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); white-space: nowrap; min-width: 56px; text-align: right; }

    /* meal entries */
    .meal-entry { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .meal-entry-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
    .meal-entry-name { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; flex: 1; }
    .meal-entry-cal { font-size: 14px; font-family: var(--font-mono); color: var(--accent); margin-right: 10px; }
    .meal-delete-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; line-height: 1; -webkit-tap-highlight-color: transparent; font-size: 18px; }
    .meal-delete-btn:active { color: #e05555; }
    .meal-macros-row { display: flex; gap: 0; }
    .meal-macro-chip { flex: 1; padding: 8px 6px; text-align: center; border-right: 1px solid var(--border); }
    .meal-macro-chip:last-child { border-right: none; }
    .meal-macro-chip-val { font-size: 14px; font-weight: 700; font-family: var(--font-mono); }
    .meal-macro-chip-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-top: 1px; }

    /* add meal form */
    .add-meal-btn { width: 100%; padding: 14px; background: none; border: 1px dashed var(--border); border-radius: var(--radius); color: var(--text-muted); font-family: var(--font-head); font-size: 16px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: border-color 0.15s, color 0.15s; -webkit-tap-highlight-color: transparent; }
    .add-meal-btn:active { border-color: var(--accent); color: var(--accent); }

    .meal-form { background: var(--surface); border: 1px solid var(--accent); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .meal-form-title { font-size: 13px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
    .meal-name-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font-head); font-size: 18px; font-weight: 700; padding: 10px 12px; outline: none; width: 100%; transition: border-color 0.15s; text-transform: uppercase; letter-spacing: 0.04em; }
    .meal-name-input:focus { border-color: var(--accent); }
    .meal-name-input::placeholder { color: var(--text-dim); text-transform: none; letter-spacing: 0; font-weight: 600; font-size: 16px; }
    .meal-form-macros { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .meal-form-field { display: flex; flex-direction: column; gap: 4px; }
    .meal-form-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .meal-form-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font-mono); font-size: 20px; font-weight: 500; padding: 10px 12px; outline: none; width: 100%; text-align: right; -webkit-appearance: none; transition: border-color 0.15s; }
    .meal-form-input:focus { border-color: var(--accent); }
    .meal-form-input::placeholder { color: var(--text-dim); font-size: 14px; }
    .meal-form-btns { display: flex; gap: 10px; }
    .meal-form-save { flex: 1; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font-head); font-size: 16px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; }
    .meal-form-cancel { padding: 13px 16px; background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-family: var(--font-head); font-size: 16px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; }

    /* quick suggestions */
    .quick-suggestions { display: flex; gap: 8px; flex-wrap: wrap; }
    .quick-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
    .quick-tag:active { border-color: var(--accent); color: var(--accent); }

    /* macro history */
    .macro-hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .macro-hist-card:active { border-color: var(--accent); }
    .macro-hist-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .macro-hist-date { font-size: 17px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
    .macro-hist-cal { font-size: 20px; font-weight: 800; font-family: var(--font-mono); color: var(--accent); }
    .macro-hist-macros { display: flex; gap: 12px; }
    .macro-hist-chip { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); }
    .macro-hist-chip b { font-weight: 500; }
    .macro-hist-meals { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); margin-top: 5px; }

    /* goals */
    .goals-page { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .goals-intro { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
    .goals-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
    .goals-card-title { font-size: 13px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
    .goals-inputs { display: flex; flex-direction: column; gap: 12px; }
    .goals-row { display: flex; align-items: center; gap: 12px; }
    .goals-label { font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; min-width: 86px; }
    .goals-label span { font-size: 10px; color: var(--text-dim); display: block; text-transform: none; letter-spacing: 0; font-weight: 500; font-family: var(--font-mono); }
    .goals-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font-mono); font-size: 18px; font-weight: 500; padding: 10px 12px; outline: none; -webkit-appearance: none; transition: border-color 0.15s; text-align: right; }
    .goals-input:focus { border-color: var(--accent); }
    .goals-input::placeholder { color: var(--text-dim); }
    .goals-save-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font-head); font-size: 17px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .goals-save-btn:active { opacity: 0.85; }

    /* toast */
    .toast { position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: #fff; padding: 10px 20px; border-radius: 24px; font-family: var(--font-head); font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 300; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ WORKOUT SECTION ══════════════════════════ -->
  <div id="section-workouts">
    <div id="view-home">
      <div class="header">
        <div class="header-title">Training <span>Log</span></div>
        <button class="header-action" onclick="showView('history')">History</button>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="showHomeTab(this,'workouts')">Workouts</button>
        <button class="tab" onclick="showHomeTab(this,'history-quick')">Recent</button>
      </div>
      <div class="scroll-body">
        <div id="home-workouts" class="day-list"></div>
        <div id="home-history-quick" class="history-list hidden"></div>
      </div>
    </div>

    <div id="view-workout" class="hidden">
      <div class="header">
        <button class="back-btn" onclick="exitWorkout()">
          <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M10 3L5 8l5 5"/></svg>Days
        </button>
        <button class="header-action" onclick="discardWorkout()">Discard</button>
      </div>
      <div class="scroll-body">
        <div class="workout-header">
          <div class="workout-day-label" id="workout-day-label"></div>
          <div class="workout-name" id="workout-name"></div>
          <div class="workout-date" id="workout-date"></div>
        </div>
        <div class="exercise-list" id="exercise-list"></div>
        <button class="finish-btn" onclick="finishWorkout()">Finish Workout</button>
        <div style="height:80px"></div>
      </div>
    </div>

    <div id="view-history" class="hidden">
      <div class="header">
        <button class="back-btn" onclick="showView('home')">
          <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M10 3L5 8l5 5"/></svg>Back
        </button>
        <div class="header-title">History</div>
        <div style="width:60px"></div>
      </div>
      <div class="scroll-body"><div class="history-list" id="history-list"></div></div>
    </div>

    <div id="view-history-detail" class="hidden">
      <div class="header">
        <button class="back-btn" onclick="showView('history')">
          <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M10 3L5 8l5 5"/></svg>History
        </button>
        <div class="header-title" id="detail-header-title"></div>
        <div style="width:60px"></div>
      </div>
      <div class="scroll-body"><div class="history-ex-list" id="history-detail-list"></div></div>
    </div>
  </div>

  <!-- ══ MACROS SECTION ═══════════════════════════ -->
  <div id="section-macros" class="hidden">
    <div id="view-macro-log">
      <div class="header">
        <div class="header-title">Macros</div>
        <button class="header-action accent" onclick="showMacroView('goals')">Goals</button>
      </div>
      <div class="tabs">
        <button class="tab active" id="mtab-log" onclick="showMacroTab(this,'log')">Log</button>
        <button class="tab" id="mtab-hist" onclick="showMacroTab(this,'history')">History</button>
      </div>
      <div class="scroll-body">
        <div id="macro-log-content" class="macro-page"></div>
        <div id="macro-hist-content" class="history-list hidden"></div>
      </div>
    </div>

    <div id="view-macro-goals" class="hidden">
      <div class="header">
        <button class="back-btn" onclick="showMacroView('log')">
          <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M10 3L5 8l5 5"/></svg>Back
        </button>
        <div class="header-title">Goals</div>
        <div style="width:60px"></div>
      </div>
      <div class="scroll-body"><div class="goals-page" id="goals-content"></div></div>
    </div>
  </div>

</div><!-- /app -->

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-workouts" onclick="switchSection('workouts')">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12M3 8h2M19 8h2M3 16h2M19 16h2"/></svg>
    Train
  </button>
  <button class="nav-btn" id="nav-macros" onclick="switchSection('macros')">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg>
    Macros
  </button>
</div>

<!-- SUMMARY MODAL -->
<div class="modal-overlay" id="summary-modal">
  <div class="modal">
    <div class="modal-title">Workout <span>Done</span></div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-val" id="stat-sets">0</div><div class="modal-stat-label">Sets</div></div>
      <div class="modal-stat"><div class="modal-stat-val" id="stat-vol">0</div><div class="modal-stat-label">Reps</div></div>
      <div class="modal-stat"><div class="modal-stat-val" id="stat-time">0</div><div class="modal-stat-label">Min</div></div>
    </div>
    <button class="modal-close-btn" onclick="closeSummary()">Back to Home</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── WORKOUT DATA ──────────────────────────────────────────────────────
const WORKOUTS = [
  { id:'push', name:'Push', day:'Day 1', exercises:[
    {name:'Barbell Bench Press',sets:4,repRange:'5-6'},
    {name:'Incline DB Press',sets:3,repRange:'10-12'},
    {name:'Seated DB Shoulder Press',sets:3,repRange:'10-12'},
    {name:'Cable Lateral Raise',sets:3,repRange:'15-20'},
    {name:'Tricep Pushdown (rope)',sets:3,repRange:'12-15'},
    {name:'Overhead Tricep Extension',sets:2,repRange:'12-15'},
  ]},
  { id:'pull', name:'Pull', day:'Day 2', exercises:[
    {name:'Weighted Pull-Up / Lat Pulldown',sets:4,repRange:'6-8'},
    {name:'Barbell Bent-Over Row',sets:4,repRange:'6-8'},
    {name:'Seated Cable Row',sets:3,repRange:'10-12'},
    {name:'Face Pull',sets:3,repRange:'15-20'},
    {name:'Incline DB Curl',sets:3,repRange:'10-12'},
    {name:'Hammer Curl',sets:2,repRange:'12-15'},
  ]},
  { id:'legs', name:'Legs', day:'Day 3', exercises:[
    {name:'Box Jump',sets:4,repRange:'4',note:'Full reset between reps'},
    {name:'Barbell Back Squat',sets:4,repRange:'5-6'},
    {name:'Romanian Deadlift',sets:3,repRange:'10-12'},
    {name:'Leg Press',sets:3,repRange:'12-15'},
    {name:'Seated Leg Curl',sets:3,repRange:'12-15'},
    {name:'Standing Calf Raise',sets:4,repRange:'12-15'},
  ]},
  { id:'upper', name:'Upper', day:'Day 4', exercises:[
    {name:'Plyo Push-Up',sets:3,repRange:'6',note:'Explosive — hands leave floor'},
    {name:'Overhead Press',sets:4,repRange:'5-6'},
    {name:'T-Bar Row',sets:3,repRange:'10-12'},
    {name:'Cable Fly',sets:3,repRange:'12-15'},
    {name:'Lat Pulldown (neutral grip)',sets:3,repRange:'10-12'},
    {name:'Lateral Raise',sets:2,repRange:'15-20'},
    {name:'Curl + Pushdown (Superset)',sets:3,repRange:'12 each',note:'Superset'},
  ]},
  { id:'lower', name:'Lower', day:'Day 5', exercises:[
    {name:'Broad Jump',sets:4,repRange:'4',note:'Full reset between reps'},
    {name:'Bulgarian Split Squat',sets:4,repRange:'8-10 each'},
    {name:'Romanian Deadlift',sets:3,repRange:'10-12'},
    {name:'Leg Extension',sets:3,repRange:'15'},
    {name:'Nordic Curl / Seated Leg Curl',sets:3,repRange:'8-10'},
    {name:'Standing Calf Raise',sets:3,repRange:'15-20'},
  ]},
];

// ── STORAGE ───────────────────────────────────────────────────────────
const store = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
  set: (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
};
const getHistory  = ()  => store.get('tl_history')  || [];
const saveHistory = h   => store.set('tl_history', h);
const getMacroLog = ()  => store.get('tl_macros')   || {};
const saveMacroLog= m   => store.set('tl_macros', m);
const getGoals    = ()  => store.get('tl_goals')    || {};
const saveGoals_  = g   => store.set('tl_goals', g);

// ── DATE HELPERS ──────────────────────────────────────────────────────
const todayKey = () => new Date().toISOString().slice(0,10);
function keyToLabel(k) {
  const [y,m,d] = k.split('-');
  const date = new Date(+y, +m-1, +d);
  const t = todayKey();
  const yest = new Date(); yest.setDate(yest.getDate()-1);
  if (k === t) return 'Today';
  if (k === yest.toISOString().slice(0,10)) return 'Yesterday';
  return date.toLocaleDateString('en-CA', {weekday:'short', month:'short', day:'numeric'});
}
function shiftKey(key, delta) {
  const [y,m,d] = key.split('-');
  const date = new Date(+y, +m-1, +d);
  date.setDate(date.getDate() + delta);
  return date.toISOString().slice(0,10);
}

// ── STATE ─────────────────────────────────────────────────────────────
let currentWorkout = null, workoutStartTime = null;
let macroDate = todayKey();
let showingAddForm = false;

// ── SECTION ───────────────────────────────────────────────────────────
function switchSection(s) {
  document.getElementById('section-workouts').classList.toggle('hidden', s !== 'workouts');
  document.getElementById('section-macros').classList.toggle('hidden', s !== 'macros');
  document.getElementById('nav-workouts').classList.toggle('active', s === 'workouts');
  document.getElementById('nav-macros').classList.toggle('active', s === 'macros');
  if (s === 'macros') { macroDate = todayKey(); showingAddForm = false; renderMacroLog(); }
  if (s === 'workouts') renderHome();
}

// ── WORKOUT VIEWS ─────────────────────────────────────────────────────
function showView(name) {
  ['home','workout','history','history-detail'].forEach(v =>
    document.getElementById('view-'+v).classList.toggle('hidden', v !== name)
  );
  if (name === 'home') renderHome();
  if (name === 'history') renderHistory();
}

function showHomeTab(btn, tab) {
  document.querySelectorAll('#section-workouts .tabs .tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('home-workouts').classList.toggle('hidden', tab !== 'workouts');
  document.getElementById('home-history-quick').classList.toggle('hidden', tab !== 'history-quick');
  if (tab === 'history-quick') renderHistoryQuick();
}

function renderHome() {
  const history = getHistory();
  const c = document.getElementById('home-workouts');
  c.innerHTML = '';
  WORKOUTS.forEach(w => {
    const last = history.find(h => h.workoutId === w.id);
    let lastText = 'Never done', recent = false;
    if (last) {
      const diff = Math.floor((Date.now() - new Date(last.date)) / 86400000);
      lastText = diff === 0 ? 'Today' : diff === 1 ? 'Yesterday' : diff < 7 ? `${diff} days ago` : new Date(last.date).toLocaleDateString('en-CA');
      recent = diff <= 2;
    }
    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="day-badge">${w.day}</div>
      <div class="day-card-info">
        <div class="day-card-name">${w.name}</div>
        <div class="day-card-sub">${w.exercises.length} exercises</div>
        <div class="day-card-last ${recent?'recent':''}">${lastText}</div>
      </div>
      <svg class="day-arrow" width="18" height="18" fill="none" viewBox="0 0 16 16"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 3l5 5-5 5"/></svg>`;
    card.onclick = () => startWorkout(w.id);
    c.appendChild(card);
  });
}

function startWorkout(id) {
  const w = WORKOUTS.find(x => x.id === id);
  const last = getHistory().find(h => h.workoutId === id) || null;
  currentWorkout = {
    workoutId: id, date: new Date().toISOString(),
    exercises: w.exercises.map((ex, ei) => ({
      name: ex.name,
      sets: Array.from({length: ex.sets}, (_, si) => ({
        weight: '', reps: '', completed: false,
        prevWeight: last?.exercises[ei]?.sets[si]?.weight || '',
        prevReps:   last?.exercises[ei]?.sets[si]?.reps   || '',
      }))
    }))
  };
  workoutStartTime = Date.now();
  document.getElementById('workout-day-label').textContent = w.day;
  document.getElementById('workout-name').textContent = w.name;
  document.getElementById('workout-date').textContent = new Date().toLocaleDateString('en-CA', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  renderExercises(w);
  showView('workout');
}

function renderExercises(w) {
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';
  w.exercises.forEach((ex, ei) => {
    const block = document.createElement('div');
    block.className = 'exercise-block';
    block.innerHTML = `
      <div class="exercise-header">
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-meta">
          <div class="exercise-target">${ex.sets} sets · ${ex.repRange} reps</div>
          ${ex.note ? `<div class="exercise-note">${ex.note}</div>` : ''}
        </div>
      </div>
      <div class="sets-container" id="sets-${ei}"></div>`;
    list.appendChild(block);
    renderSets(ei);
  });
}

function renderSets(ei) {
  const c = document.getElementById('sets-'+ei);
  c.innerHTML = '';
  const hdr = document.createElement('div');
  hdr.className = 'sets-header-row';
  hdr.innerHTML = '<div class="sets-header-cell">#</div><div class="sets-header-cell">Weight (lb)</div><div class="sets-header-cell">Reps</div><div class="sets-header-cell"></div>';
  c.appendChild(hdr);
  currentWorkout.exercises[ei].sets.forEach((set, si) => {
    const row = document.createElement('div');
    row.className = `set-row${set.completed?' completed':''}`;
    row.id = `set-${ei}-${si}`;
    const prevHint = (set.prevWeight||set.prevReps) ? `${set.prevWeight||'—'} lb × ${set.prevReps||'—'}` : '';
    row.innerHTML = `
      <div class="set-num">${si+1}</div>
      <div><input class="set-input" type="number" inputmode="decimal" placeholder="${set.prevWeight||'lb'}" value="${set.weight}" onchange="updSet(${ei},${si},'weight',this.value)"></div>
      <div><input class="set-input" type="number" inputmode="numeric" placeholder="${set.prevReps||'reps'}" value="${set.reps}" onchange="updSet(${ei},${si},'reps',this.value)"></div>
      <button class="set-complete-btn" onclick="toggleSet(${ei},${si})">${set.completed?chk():''}</button>`;
    c.appendChild(row);
    if (prevHint) {
      const pr = document.createElement('div');
      pr.innerHTML = `<div style="padding:2px 12px 8px 48px;color:var(--text-dim);font-size:10px;font-family:var(--font-mono)">prev: ${prevHint}</div>`;
      c.appendChild(pr);
    }
  });
}

const chk = () => `<svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M3 8l4 4 6-6"/></svg>`;
function updSet(ei,si,f,v) { currentWorkout.exercises[ei].sets[si][f]=v; }
function toggleSet(ei,si) {
  const set = currentWorkout.exercises[ei].sets[si];
  set.completed = !set.completed;
  const row = document.getElementById(`set-${ei}-${si}`);
  row.classList.toggle('completed', set.completed);
  row.querySelector('.set-complete-btn').innerHTML = set.completed ? chk() : '';
}

function finishWorkout() {
  const duration = Math.round((Date.now()-workoutStartTime)/60000);
  const sets = currentWorkout.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.completed).length, 0);
  const reps = currentWorkout.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.completed).reduce((b,s)=>b+(parseInt(s.reps)||0),0), 0);
  currentWorkout.duration=duration; currentWorkout.completedSets=sets; currentWorkout.totalReps=reps;
  const h = getHistory(); h.unshift(currentWorkout); if(h.length>100)h.length=100; saveHistory(h);
  document.getElementById('stat-sets').textContent=sets;
  document.getElementById('stat-vol').textContent=reps;
  document.getElementById('stat-time').textContent=duration;
  document.getElementById('summary-modal').classList.add('visible');
}
function closeSummary() { document.getElementById('summary-modal').classList.remove('visible'); currentWorkout=null; showView('home'); }
function exitWorkout() {
  if (!currentWorkout) { showView('home'); return; }
  const done = currentWorkout.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.completed).length,0);
  if (done===0||confirm('Exit workout? Progress will be lost.')) {
    currentWorkout=null; showView('home');
  }
}
function discardWorkout() {
  if (confirm('Discard this workout?')) {
    currentWorkout=null; showView('home');
  }
}

function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  const h = getHistory();
  if (!h.length) { list.innerHTML='<div class="history-empty">No workouts yet</div>'; return; }
  h.forEach((s,i) => {
    const w = WORKOUTS.find(x=>x.id===s.workoutId);
    const card = document.createElement('div');
    card.className = 'history-card';
    const date = new Date(s.date);
    card.innerHTML = `
      <div class="history-card-top">
        <div class="history-card-name">${w?w.name:s.workoutId}</div>
        <div class="history-card-date">${date.toLocaleDateString('en-CA')}<br>${date.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div class="history-card-stats">
        <div class="history-stat"><div class="history-stat-val">${s.completedSets||0}</div><div class="history-stat-label">Sets</div></div>
        <div class="history-stat"><div class="history-stat-val">${s.totalReps||0}</div><div class="history-stat-label">Reps</div></div>
        <div class="history-stat"><div class="history-stat-val">${s.duration||0}</div><div class="history-stat-label">Min</div></div>
      </div>`;
    card.onclick=()=>showHistoryDetail(i);
    list.appendChild(card);
  });
}
function renderHistoryQuick() {
  const list=document.getElementById('home-history-quick'); list.innerHTML='';
  const h=getHistory().slice(0,5);
  if(!h.length){list.innerHTML='<div class="history-empty">No workouts yet</div>';return;}
  h.forEach((s,i)=>{
    const w=WORKOUTS.find(x=>x.id===s.workoutId);
    const card=document.createElement('div'); card.className='history-card';
    card.innerHTML=`
      <div class="history-card-top"><div class="history-card-name">${w?w.name:s.workoutId}</div><div class="history-card-date">${new Date(s.date).toLocaleDateString('en-CA')}</div></div>
      <div class="history-card-stats">
        <div class="history-stat"><div class="history-stat-val">${s.completedSets||0}</div><div class="history-stat-label">Sets</div></div>
        <div class="history-stat"><div class="history-stat-val">${s.totalReps||0}</div><div class="history-stat-label">Reps</div></div>
        <div class="history-stat"><div class="history-stat-val">${s.duration||0}</div><div class="history-stat-label">Min</div></div>
      </div>`;
    card.onclick=()=>showHistoryDetail(i); list.appendChild(card);
  });
}
function showHistoryDetail(idx) {
  const s=getHistory()[idx];
  const w=WORKOUTS.find(x=>x.id===s.workoutId);
  document.getElementById('detail-header-title').textContent=w?w.name:s.workoutId;
  const list=document.getElementById('history-detail-list'); list.innerHTML='';
  s.exercises.forEach(ex=>{
    const done=ex.sets.filter(s=>s.completed||s.weight||s.reps);
    if(!done.length)return;
    const b=document.createElement('div'); b.className='history-ex-block';
    b.innerHTML=`<div class="history-ex-name">${ex.name}</div>`+done.map((s,i)=>`<div class="history-set-row"><div class="history-set-num">Set ${i+1}</div><div class="history-set-data">${s.weight||'—'} <span>lb ×</span> ${s.reps||'—'} <span>reps</span></div></div>`).join('');
    list.appendChild(b);
  });
  const dd=document.createElement('div');
  dd.style.cssText='padding:0 16px 8px;font-size:12px;font-family:var(--font-mono);color:var(--text-dim)';
  dd.textContent=new Date(s.date).toLocaleDateString('en-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  list.prepend(dd);
  showView('history-detail');
}

// ══════════════════════════════════════════════════════════════════════
// MACROS
// ══════════════════════════════════════════════════════════════════════

// Data structure: macroLog[dateKey] = [{ id, name, calories, protein, carbs, fat }, ...]

function getDayMeals(key) {
  const log = getMacroLog();
  const entry = log[key];
  // Guard against old format (single object) or missing
  if (!entry) return [];
  if (!Array.isArray(entry)) return [];
  return entry;
}
function saveDayMeals(key, meals) {
  const log = getMacroLog();
  log[key] = meals;
  saveMacroLog(log);
}
function totals(meals) {
  return meals.reduce((acc, m) => ({
    calories: acc.calories + (parseFloat(m.calories)||0),
    protein:  acc.protein  + (parseFloat(m.protein)||0),
    carbs:    acc.carbs    + (parseFloat(m.carbs)||0),
    fat:      acc.fat      + (parseFloat(m.fat)||0),
  }), {calories:0, protein:0, carbs:0, fat:0});
}

function showMacroView(name) {
  document.getElementById('view-macro-log').classList.toggle('hidden', name!=='log');
  document.getElementById('view-macro-goals').classList.toggle('hidden', name!=='goals');
  if (name==='goals') renderGoalsView();
  if (name==='log') renderMacroLog();
}
function showMacroTab(btn, tab) {
  document.querySelectorAll('#section-macros .tabs .tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('macro-log-content').classList.toggle('hidden', tab!=='log');
  document.getElementById('macro-hist-content').classList.toggle('hidden', tab!=='history');
  if (tab==='history') renderMacroHistory();
}

function barHTML(val, goal, color) {
  const pct = goal>0 ? Math.min(val/goal,1)*100 : 0;
  const over = goal>0 && val>goal;
  return `<div class="macro-bar-fill" style="width:${pct}%;background:${over?'var(--accent)':color}"></div>`;
}

function renderMacroLog() {
  showingAddForm = false;
  const meals = getDayMeals(macroDate);
  const g = getGoals();
  const t = totals(meals);
  const isToday = macroDate === todayKey();
  const content = document.getElementById('macro-log-content');

  // totals section
  const hasGoals = g.calories||g.protein||g.carbs||g.fat;
  let barsHTML = '';
  if (hasGoals) {
    barsHTML = `<div class="macro-bars">
      ${g.calories?`<div class="macro-bar-row"><div class="macro-bar-name" style="color:var(--accent)">Cal</div><div class="macro-bar-track">${barHTML(t.calories,g.calories,'var(--accent)')}</div><div class="macro-bar-nums">${t.calories} / ${g.calories}</div></div>`:''}
      ${g.protein ?`<div class="macro-bar-row"><div class="macro-bar-name" style="color:var(--blue)">Pro</div><div class="macro-bar-track">${barHTML(t.protein,g.protein,'var(--blue)')}</div><div class="macro-bar-nums">${t.protein}g / ${g.protein}g</div></div>`:''}
      ${g.carbs   ?`<div class="macro-bar-row"><div class="macro-bar-name" style="color:var(--purple)">Carbs</div><div class="macro-bar-track">${barHTML(t.carbs,g.carbs,'var(--purple)')}</div><div class="macro-bar-nums">${t.carbs}g / ${g.carbs}g</div></div>`:''}
      ${g.fat     ?`<div class="macro-bar-row"><div class="macro-bar-name" style="color:var(--yellow)">Fat</div><div class="macro-bar-track">${barHTML(t.fat,g.fat,'var(--yellow)')}</div><div class="macro-bar-nums">${t.fat}g / ${g.fat}g</div></div>`:''}
    </div>`;
  }

  let mealsHTML = '';
  meals.forEach((m) => {
    mealsHTML += `
    <div class="meal-entry">
      <div class="meal-entry-header">
        <div class="meal-entry-name">${m.name||'Meal'}</div>
        <div class="meal-entry-cal">${m.calories||0} kcal</div>
        <button class="meal-delete-btn" onclick="deleteMeal(${m.id})" title="Delete">×</button>
      </div>
      <div class="meal-macros-row">
        <div class="meal-macro-chip"><div class="meal-macro-chip-val" style="color:var(--blue)">${m.protein||0}g</div><div class="meal-macro-chip-label">Protein</div></div>
        <div class="meal-macro-chip"><div class="meal-macro-chip-val" style="color:var(--purple)">${m.carbs||0}g</div><div class="meal-macro-chip-label">Carbs</div></div>
        <div class="meal-macro-chip"><div class="meal-macro-chip-val" style="color:var(--yellow)">${m.fat||0}g</div><div class="meal-macro-chip-label">Fat</div></div>
      </div>
    </div>`;
  });

  content.innerHTML = `
    <div class="macro-date-bar">
      <button class="macro-date-nav" onclick="shiftMacroDate(-1)">&#8249;</button>
      <div class="macro-date-display" onclick="pickMacroDate()">${keyToLabel(macroDate)}</div>
      <button class="macro-date-nav" onclick="shiftMacroDate(1)" ${isToday?'disabled':''}>&#8250;</button>
    </div>

    <div class="macro-totals">
      <div class="macro-totals-title">Daily Total — ${meals.length} item${meals.length!==1?'s':''}</div>
      <div class="macro-totals-grid">
        <div class="macro-total-item">
          <div class="macro-total-val" style="color:var(--accent)">${Math.round(t.calories)}</div>
          <div class="macro-total-label">kcal</div>
          ${g.calories?`<div class="macro-total-goal">/ ${g.calories}</div>`:''}
        </div>
        <div class="macro-total-item">
          <div class="macro-total-val" style="color:var(--blue)">${Math.round(t.protein)}g</div>
          <div class="macro-total-label">protein</div>
          ${g.protein?`<div class="macro-total-goal">/ ${g.protein}g</div>`:''}
        </div>
        <div class="macro-total-item">
          <div class="macro-total-val" style="color:var(--purple)">${Math.round(t.carbs)}g</div>
          <div class="macro-total-label">carbs</div>
          ${g.carbs?`<div class="macro-total-goal">/ ${g.carbs}g</div>`:''}
        </div>
        <div class="macro-total-item">
          <div class="macro-total-val" style="color:var(--yellow)">${Math.round(t.fat)}g</div>
          <div class="macro-total-label">fat</div>
          ${g.fat?`<div class="macro-total-goal">/ ${g.fat}g</div>`:''}
        </div>
      </div>
      ${hasGoals ? `<div style="margin-top:12px">${barsHTML}</div>` : ''}
    </div>

    ${mealsHTML}
    <div id="add-meal-area"></div>
  `;

  renderAddArea();
}

function renderAddArea() {
  const area = document.getElementById('add-meal-area');
  if (!area) return;
  if (showingAddForm) {
    const SUGGESTIONS = ['Breakfast','Morning snack','Lunch','Afternoon snack','Dinner','Post-workout','Evening snack'];
    area.innerHTML = `
      <div class="meal-form" id="meal-form">
        <div class="meal-form-title">Add Item</div>
        <div class="quick-suggestions">
          ${SUGGESTIONS.map(s=>`<div class="quick-tag" onclick="setMealName('${s}')">${s}</div>`).join('')}
        </div>
        <input class="meal-name-input" id="form-name" type="text" placeholder="Name (e.g. Lunch, Snack…)" maxlength="40">
        <div class="meal-form-macros">
          <div class="meal-form-field">
            <div class="meal-form-label" style="color:var(--accent)">Calories (kcal)</div>
            <input class="meal-form-input" id="form-cal" type="number" inputmode="decimal" placeholder="0">
          </div>
          <div class="meal-form-field">
            <div class="meal-form-label" style="color:var(--blue)">Protein (g)</div>
            <input class="meal-form-input" id="form-pro" type="number" inputmode="decimal" placeholder="0">
          </div>
          <div class="meal-form-field">
            <div class="meal-form-label" style="color:var(--purple)">Carbs (g)</div>
            <input class="meal-form-input" id="form-carbs" type="number" inputmode="decimal" placeholder="0">
          </div>
          <div class="meal-form-field">
            <div class="meal-form-label" style="color:var(--yellow)">Fat (g)</div>
            <input class="meal-form-input" id="form-fat" type="number" inputmode="decimal" placeholder="0">
          </div>
        </div>
        <div class="meal-form-btns">
          <button class="meal-form-cancel" onclick="cancelAdd()">Cancel</button>
          <button class="meal-form-save" onclick="saveMeal()">Add</button>
        </div>
      </div>`;
  } else {
    area.innerHTML = `<button class="add-meal-btn" onclick="openAddForm()">
      <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M8 3v10M3 8h10"/></svg>
      Add item
    </button>`;
  }
}

function openAddForm() {
  showingAddForm = true;
  renderAddArea();
  setTimeout(() => { const el = document.getElementById('form-name'); if(el) el.focus(); }, 80);
}
function cancelAdd() {
  showingAddForm = false;
  renderAddArea();
}
function setMealName(name) {
  const el = document.getElementById('form-name');
  if (el) { el.value = name; el.focus(); }
}
function saveMeal() {
  const name    = (document.getElementById('form-name')?.value||'').trim() || 'Meal';
  const calories= document.getElementById('form-cal')?.value.trim()  || '0';
  const protein = document.getElementById('form-pro')?.value.trim()  || '0';
  const carbs   = document.getElementById('form-carbs')?.value.trim()|| '0';
  const fat     = document.getElementById('form-fat')?.value.trim()  || '0';
  const meals = getDayMeals(macroDate);
  meals.push({ id: Date.now(), name, calories, protein, carbs, fat });
  saveDayMeals(macroDate, meals);
  showingAddForm = false;
  showToast('Added');
  renderMacroLog();
}
function deleteMeal(mealId) {
  const meals = getDayMeals(macroDate).filter(m => m.id !== mealId);
  saveDayMeals(macroDate, meals);
  renderMacroLog();
}

function shiftMacroDate(delta) {
  const next = shiftKey(macroDate, delta);
  if (next > todayKey()) return;
  macroDate = next; showingAddForm = false; renderMacroLog();
}
function pickMacroDate() {
  const val = prompt('Enter date (YYYY-MM-DD):', macroDate);
  if (!val) return;
  if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) { alert('Use format YYYY-MM-DD'); return; }
  if (val > todayKey()) { alert("Can't log future dates."); return; }
  macroDate = val; showingAddForm = false; renderMacroLog();
}

function renderMacroHistory() {
  const log = getMacroLog();
  const g = getGoals();
  const list = document.getElementById('macro-hist-content');
  list.innerHTML = '';
  const keys = Object.keys(log).filter(k => (log[k]||[]).length > 0).sort((a,b) => b.localeCompare(a));
  if (!keys.length) { list.innerHTML = '<div class="history-empty">No entries yet</div>'; return; }
  keys.forEach(k => {
    const meals = log[k] || [];
    const t = totals(meals);
    const card = document.createElement('div');
    card.className = 'macro-hist-card';
    card.innerHTML = `
      <div class="macro-hist-top">
        <div class="macro-hist-date">${keyToLabel(k)}</div>
        <div class="macro-hist-cal">${Math.round(t.calories)} <span style="font-size:12px;color:var(--text-muted);font-family:var(--font-head);font-weight:700">kcal</span></div>
      </div>
      <div class="macro-hist-macros">
        <div class="macro-hist-chip" style="color:var(--blue)"><b>${Math.round(t.protein)}g</b> pro</div>
        <div class="macro-hist-chip" style="color:var(--purple)"><b>${Math.round(t.carbs)}g</b> carbs</div>
        <div class="macro-hist-chip" style="color:var(--yellow)"><b>${Math.round(t.fat)}g</b> fat</div>
        ${g.calories&&t.calories?`<div class="macro-hist-chip">${Math.round(t.calories/g.calories*100)}% of goal</div>`:''}
      </div>
      <div class="macro-hist-meals">${meals.length} item${meals.length!==1?'s':''}: ${meals.map(m=>m.name).join(', ')}</div>`;
    card.onclick = () => {
      macroDate = k; showingAddForm = false;
      showMacroTab(document.getElementById('mtab-log'), 'log');
      renderMacroLog();
    };
    list.appendChild(card);
  });
}

function renderGoalsView() {
  const g = getGoals();
  document.getElementById('goals-content').innerHTML = `
    <div class="goals-intro">Set your daily targets — shown as progress bars on the log screen</div>
    <div class="goals-card">
      <div class="goals-card-title">Daily Targets</div>
      <div class="goals-inputs">
        <div class="goals-row">
          <div class="goals-label" style="color:var(--accent)">Calories<span>kcal / day</span></div>
          <input class="goals-input" type="number" inputmode="decimal" id="g-cal" placeholder="e.g. 2200" value="${g.calories||''}">
        </div>
        <div class="goals-row">
          <div class="goals-label" style="color:var(--blue)">Protein<span>grams / day</span></div>
          <input class="goals-input" type="number" inputmode="decimal" id="g-pro" placeholder="e.g. 170" value="${g.protein||''}">
        </div>
        <div class="goals-row">
          <div class="goals-label" style="color:var(--purple)">Carbs<span>grams / day</span></div>
          <input class="goals-input" type="number" inputmode="decimal" id="g-carbs" placeholder="e.g. 250" value="${g.carbs||''}">
        </div>
        <div class="goals-row">
          <div class="goals-label" style="color:var(--yellow)">Fat<span>grams / day</span></div>
          <input class="goals-input" type="number" inputmode="decimal" id="g-fat" placeholder="e.g. 70" value="${g.fat||''}">
        </div>
      </div>
    </div>
    <button class="goals-save-btn" onclick="saveGoalsForm()">Save Goals</button>`;
}
function saveGoalsForm() {
  saveGoals_({
    calories: document.getElementById('g-cal').value.trim(),
    protein:  document.getElementById('g-pro').value.trim(),
    carbs:    document.getElementById('g-carbs').value.trim(),
    fat:      document.getElementById('g-fat').value.trim(),
  });
  showToast('Goals saved');
  showMacroView('log');
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

// ── INIT ──────────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
